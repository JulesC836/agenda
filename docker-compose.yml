

networks:
  agenda-network:
    driver: bridge

services:
  database:
    image: mysql:8.4
    container_name: agenda-db
    environment:
      MYSQL_ROOT_PASSWORD: supersecure
      MYSQL_DATABASE: agenda
      MYSQL_USER: user
      MYSQL_PASSWORD: md_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - agenda-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uuser", "-pmd_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: agenda-backend
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: database
      DB_DATABASE: agenda
      DB_USERNAME: user
      DB_PASSWORD: md_pass
      APP_ENV: local
      APP_DEBUG: true
    networks:
      - agenda-network
    volumes:
      - ./backend/storage:/var/www/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agenda-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - agenda-network

volumes:
  mysql_data:
    driver: local
