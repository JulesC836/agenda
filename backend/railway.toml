[build]
dockerfile = "Dockerfile"

[deploy]
startCommand = "php artisan config:clear --force && php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = ""
healthcheckTimeout = 60
restartPolicyType = "on_failure"

[deploy.env]
DB_HOST = "${{MariaDB.MYSQLHOST}}"
DB_PORT = "${{MariaDB.MYSQLPORT}}"
DB_DATABASE = "${{MariaDB.MYSQLDATABASE}}"
DB_USERNAME = "${{MariaDB.MYSQLUSER}}"
DB_PASSWORD = "${{MariaDB.MYSQLPASSWORD}}"
