[build]
dockerfile = "Dockerfile"

[deploy]
startCommand = "php artisan config:clear && php artisan key:generate --force && php artisan serve --host=0.0.0.0 --port=8000"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"

[deploy.env]
DB_HOST = "${{MariaDB.MYSQLHOST}}"
DB_PORT = "${{MariaDB.MYSQLPORT}}"
DB_DATABASE = "${{MariaDB.MYSQLDATABASE}}"
DB_USERNAME = "${{MariaDB.MYSQLUSER}}"
DB_PASSWORD = "${{MariaDB.MYSQLPASSWORD}}"
